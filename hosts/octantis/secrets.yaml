# Secrets managed by agenix
# Encrypt with: agenix -e secrets.yaml
# Decrypt on rebuild: nixos-rebuild switch --flake .

# Example:
# db_password:
#   file = ./secrets/db_password.age
#   owner = "jellyfin"
#   group = "jellyfin"
#   mode = "0440"

# Generate your SSH public key for encryption:
# ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 (if not already present)
# Then add it to shared/secrets/secrets.nix

# Secrets structure (uncomment and customize):
# secret_name:
#   file = ./secrets/secret_name.age
#   owner = "username"
#   group = "groupname"
#   mode = "0440"
